<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 648" width="1680" height="648" style="display:block"><rect x="0" y="0" width="1680" height="648" fill="#ffffff"></rect><rect x="56" y="96" width="1568" height="168" rx="14" fill="#f7fafd" stroke="#e2e6ec" stroke-width="1.2"></rect><rect x="56" y="386" width="1568" height="168" rx="14" fill="#f8fbfd" stroke="#e2e6ec" stroke-width="1.2"></rect><text x="74" y="84" text-anchor="start" style="font:700 12.5px &#39;Inter&#39;, sans-serif;fill:#20242c;letter-spacing:1.4px;text-transform:uppercase;">DATA PREPARATION</text><text x="252" y="84" text-anchor="start" style="font:400 12.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">— one-time build, then per run</text><text x="74" y="374" text-anchor="start" style="font:700 12.5px &#39;Inter&#39;, sans-serif;fill:#20242c;letter-spacing:1.4px;text-transform:uppercase;">TRAINING LOOP</text><text x="228" y="374" text-anchor="start" style="font:400 12.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">— per epoch</text><path d="M92 126 V238 A116 14 0 0 0 324 238 V126" fill="#e1ecfb" stroke="#9cbbe4" stroke-width="1.3"></path><ellipse cx="208" cy="126" rx="116" ry="14" fill="#eff5fe" stroke="#9cbbe4" stroke-width="1.3"></ellipse><text x="208" y="168" text-anchor="middle" style="font:700 13.5px &#39;JetBrains Mono&#39;, monospace;fill:#214f96;">chest-xray-14-320</text><text x="208" y="194" text-anchor="middle" style="font:400 12px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">320² RGB · 36 Parquet shards</text><text x="208" y="214" text-anchor="middle" style="font:400 12px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">~7.97 GB · pinned revision</text><text x="208" y="274" text-anchor="middle" style="font:400 11.5px &#39;Inter&#39;, sans-serif;fill:#737a88;">Hugging Face dataset</text><rect x="470" y="122" width="330" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="635" y="152" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Deterministic split</text><text x="635" y="178" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">NIH manifests + SHA-256 bucket</text><text x="635" y="200" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">train 77,967 · val 8,557</text><text x="635" y="222" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">test 25,596 (patient-disjoint)</text><rect x="938" y="122" width="600" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="1238" y="152" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Augmentation pipeline</text><text x="1238" y="178" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">CLAHE · h-flip · rotate ±15° · affine · color jitter</text><text x="1238" y="200" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">Gaussian blur · random erasing · ImageNet norm</text><line x1="330" y1="180" x2="453.9" y2="180" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M462 180 L453.71045105397405 183.50476508077784 L453.71045105397405 176.49523491922216 Z" fill="#3b414d"></path><line x1="806" y1="180" x2="921.9" y2="180" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M930 180 L921.710451053974 183.50476508077784 L921.710451053974 176.49523491922216 Z" fill="#3b414d"></path><path d="M1235 264 L1235 332 L1423 332 L1423 386" fill="none" stroke="#2f6fd6" stroke-width="1.9" stroke-linejoin="round" stroke-linecap="round"></path><path d="M1423 386 L1419.4952349192222 377.71045105397405 L1426.5047650807778 377.71045105397405 Z" fill="#2f6fd6"></path><rect x="1233" y="320" width="192" height="26" rx="13" fill="#fff" stroke="#9cbbe4" stroke-width="1.1"></rect><text x="1329" y="337" text-anchor="middle" style="font:600 12px &#39;JetBrains Mono&#39;, monospace;fill:#214f96;">augmented mini-batch</text><rect x="1226" y="412" width="394" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><path d="M1227.5 424 a10.5 10.5 0 0 1 10.5 -10.5 M1227.5 516 a10.5 10.5 0 0 0 10.5 10.5"></path><rect x="1226" y="412" width="4" height="116" rx="2" fill="#2f6fd6"></rect><rect x="1230" y="412" width="6" height="116" fill="#ffffff"></rect><text x="1433" y="442" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Dual-head forward</text><text x="1433" y="468" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">AMP fp16 · single pass</text><text x="1433" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">→ 14 logits   +   1 logit</text><rect x="812" y="412" width="372" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="998" y="442" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Combined loss</text><text x="998" y="468" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">weighted BCE×14 (pos_weight)</text><text x="998" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">+ BCE binary</text><text x="998" y="512" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">L = 1.0·L_ml + 0.5·L_bin</text><rect x="398" y="412" width="372" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><text x="584" y="442" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Optimize</text><text x="584" y="468" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">AdamW + cosine · clip 1.0</text><text x="584" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">grad accum ×4 · eff. batch 96</text><rect x="60" y="412" width="300" height="116" rx="12" fill="#ffffff" stroke="#c6ccd6" stroke-width="1.3"></rect><path d="M61.5 424 a10.5 10.5 0 0 1 10.5 -10.5 M61.5 516 a10.5 10.5 0 0 0 10.5 10.5"></path><rect x="60" y="412" width="4" height="116" rx="2" fill="#cf6037"></rect><rect x="64" y="412" width="6" height="116" fill="#ffffff"></rect><text x="220" y="442" text-anchor="middle" style="font:700 16.5px &#39;Inter&#39;, sans-serif;fill:#20242c;">Select + publish</text><text x="220" y="468" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">best val macro AUC-ROC</text><text x="220" y="490" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">checkpoint + history</text><text x="220" y="512" text-anchor="middle" style="font:400 13px &#39;JetBrains Mono&#39;, monospace;fill:#3b414d;">→ HF Hub · model card</text><line x1="1220" y1="470" x2="1200.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M1192 470 L1200.289548946026 466.4952349192221 L1200.289548946026 473.5047650807779 Z" fill="#3b414d"></path><line x1="806" y1="470" x2="786.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M778 470 L786.289548946026 466.4952349192221 L786.289548946026 473.5047650807779 Z" fill="#3b414d"></path><line x1="392" y1="470" x2="376.1" y2="470" stroke="#3b414d" stroke-width="1.9" stroke-linecap="round"></line><path d="M368 470 L376.28954894602595 466.4952349192221 L376.28954894602595 473.5047650807779 Z" fill="#3b414d"></path><path d="M584 554 L584 600 L1423 600 L1423 554" fill="none" stroke="#737a88" stroke-width="1.5" stroke-dasharray="5 5" stroke-linejoin="round" stroke-linecap="round"></path><path d="M1423 554 L1426.5047650807778 562.289548946026 L1419.4952349192222 562.289548946026 Z" fill="#737a88"></path><rect x="815.5" y="587" width="376" height="26" 