<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CheXVision Deck</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --text: #1f2328;
        --muted: #5f6b73;
        --accent: #0f766e;
        --panel: #ffffff;
        --border: #d9dee3;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151719;
          --text: #eef2f4;
          --muted: #a8b2b9;
          --accent: #67e8d3;
          --panel: #1f2428;
          --border: #384149;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      code {
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 0.95em;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
    <script>
      const deckPath = "CheXVision%20Deck.html";

      fetch(deckPath, { method: "HEAD", cache: "no-store" })
        .then((response) => {
          if (response.ok) {
            window.location.replace(deckPath);
          }
        })
        .catch(() => {});
    </script>
  </head>
  <body>
    <main>
      <h1>CheXVision Deck</h1>
      <p>
        GitHub Pages is ready. Add <code>CheXVision Deck.html</code>, <code>deck-stage.js</code>,
        and <code>assets/</code> beside this file, then this page will open the deck automatically.
      </p>
      <p><a href="CheXVision%20Deck.html">Open deck</a></p>
    </main>
  </body>
</html>
