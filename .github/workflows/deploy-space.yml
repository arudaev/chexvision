name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "src/**"
      - "README.md"
      - "Dockerfile"
      - "requirements.txt"
      - ".dockerignore"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Streamlit App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add hf https://arudaev:${HF_TOKEN}@huggingface.co/spaces/arudaev/chexvision-demo || true
          git rm -r --cached docs/ scripts/ tests/ kaggle/ configs/ 2>/dev/null || true
          git commit -m "ci: strip non-app dirs for HF Space" --allow-empty
          git push hf HEAD:main --force
