name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "src/**"
      - "README.md"
      - "Dockerfile"
      - "requirements.txt"
      - ".dockerignore"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Streamlit App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Build a SINGLE orphan commit containing only what the Space needs.
          # Pushing the full history would ship the repo's binary files (docs/ PNGs
          # and reference PDFs), which HF's pre-receive hook now rejects (XET rule).
          # An orphan commit has no history, so only this clean tree is scanned.
          git checkout --orphan hf-deploy
          git reset
          git add app src README.md requirements.txt Dockerfile
          [ -f .dockerignore ] && git add .dockerignore || true
          # The app does not use the from-scratch NumPy net; drop its submodule gitlink.
          git rm -r --cached --ignore-unmatch src/numpy_net
          git commit -m "ci: deploy app to HF Space"
          git remote add hf https://arudaev:${HF_TOKEN}@huggingface.co/spaces/arudaev/chexvision-demo || true
          git push hf hf-deploy:main --force
