name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "src/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".dockerignore"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Streamlit App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://HlexNC:${HF_TOKEN}@huggingface.co/spaces/HlexNC/chexvision-demo || true
          git push hf main --force
