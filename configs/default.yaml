# CheXVision — Default Configuration
# Override per-model in scratch.yaml / transfer.yaml

seed: 42

data:
  dataset_name: "HlexNC/chest-xray-14-320"
  image_size: 320
  num_workers: 4
  pin_memory: true
  train_split: 0.7
  val_split: 0.1
  test_split: 0.2

  augmentation:
    horizontal_flip: true
    rotation_degrees: 15
    affine_translate: 0.05
    affine_shear: 5
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.05
    gaussian_blur_prob: 0.2
    random_erasing_prob: 0.1

  # 14 pathology labels (NIH Chest X-ray14 ontology)
  labels:
    - Atelectasis
    - Cardiomegaly
    - Effusion
    - Infiltration
    - Mass
    - Nodule
    - Pneumonia
    - Pneumothorax
    - Consolidation
    - Edema
    - Emphysema
    - Fibrosis
    - Pleural_Thickening
    - Hernia

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 10
  gradient_clip_norm: 1.0

  # Automatic Mixed Precision — fp16 compute, fp32 params (~1.7x speedup on T4/P100)
  use_amp: true

  # Gradient accumulation — effective_batch = batch_size × grad_accum_steps
  # 32 × 4 = 128 effective batch size for stable training
  grad_accum_steps: 4

  # Task weights for combined loss
  multilabel_weight: 1.0
  binary_weight: 0.5

evaluation:
  primary_metric: "auc_roc_macro"
  threshold: 0.5

logging:
  log_dir: "logs/"
  checkpoint_dir: "checkpoints/"
  save_every_n_epochs: 5
  log_every_n_steps: 100

huggingface:
  dataset_repo: "HlexNC/chest-xray-14-320"
  scratch_model_repo: "HlexNC/chexvision-scratch"
  transfer_model_repo: "HlexNC/chexvision-densenet"
  space_repo: "HlexNC/chexvision-demo"
